<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NFL Trivia - QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Arial Black, Arial, sans-serif;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px;
}
.card {
  border: 4px solid #013369;
  border-radius: 20px;
  padding: 36px 40px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.football { font-size: 52px; margin-bottom: 6px; }
.title {
  font-size: 28px;
  font-weight: 900;
  color: #013369;
  letter-spacing: -1px;
}
.subtitle {
  font-size: 13px;
  color: #D50A0A;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 24px;
  font-weight: bold;
}
#qrcode {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
#qrcode canvas, #qrcode img {
  border: 3px solid #013369;
  border-radius: 8px;
}
.url {
  font-size: 13px;
  color: #333;
  margin-bottom: 6px;
  word-break: break-all;
  font-weight: bold;
}
.url-small {
  font-size: 11px;
  color: #888;
  margin-bottom: 24px;
}
.tagline {
  font-size: 13px;
  color: #555;
  border-top: 1px solid #eee;
  padding-top: 16px;
  line-height: 1.6;
}
.tagline b { color: #013369; }
.print-btn {
  margin-top: 28px;
  padding: 12px 32px;
  font-size: 16px;
  font-family: inherit;
  font-weight: 900;
  background: linear-gradient(135deg, #D50A0A, #013369);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.print-btn:hover { opacity: 0.9; }
@media print {
  .print-btn { display: none; }
  body { justify-content: flex-start; padding: 20px; }
  .card { box-shadow: none; }
}
</style>
</head>
<body>
<div class="card">
  <div class="football">🏈</div>
  <div class="title">NFL TRIVIA</div>
  <div class="subtitle">Challenge</div>
  <div id="qrcode"></div>
  <div class="url">wrcarpenter2018.github.io/nfl</div>
  <div class="url-small">https://wrcarpenter2018.github.io/nfl</div>
  <div class="tagline">
    Scan to play! Answer NFL trivia, collect<br>
    <b>footballs → players → legends → ultra legends</b><br>
    Can you become the Ultimate NFL Champion?
  </div>
</div>
<button class="print-btn" onclick="window.print()">🖨️ Print This QR Code</button>

<script>
window.addEventListener('load', function() {
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://wrcarpenter2018.github.io/nfl',
    width: 220,
    height: 220,
    colorDark: '#013369',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
});
</script>
</body>
</html>
